<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 540" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="540" fill="#ffffff"/>
  <text x="380" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#15202e">MenuMetrics — Cloud Architecture</text>
  <text x="380" y="56" text-anchor="middle" font-size="12.5" fill="#64748b">Next.js client + serverless API · Supabase (Postgres, Auth, RLS) · cloud hosting</text>

  <!-- Presentation / application tier -->
  <rect x="50" y="86" width="660" height="150" rx="12" fill="#eff6ff" stroke="#4f9cf9" stroke-width="2"/>
  <text x="70" y="112" font-size="15" font-weight="700" fill="#1d4ed8">1 · Next.js application (browser + serverless routes)</text>
  <rect x="70" y="124" width="200" height="44" rx="8" fill="#fff" stroke="#bfdbfe"/><text x="170" y="151" text-anchor="middle" font-size="12" fill="#0f172a">Pages: dashboard, menu,</text>
  <rect x="70" y="124" width="200" height="44" rx="8" fill="none"/><text x="170" y="135" text-anchor="middle" font-size="0" fill="#0f172a"></text>
  <rect x="290" y="124" width="200" height="44" rx="8" fill="#fff" stroke="#bfdbfe"/><text x="390" y="143" text-anchor="middle" font-size="12" fill="#0f172a">analytics.js (Kasavana–</text><text x="390" y="159" text-anchor="middle" font-size="12" fill="#0f172a">Smith + waste + advisor)</text>
  <text x="170" y="151" text-anchor="middle" font-size="12" fill="#0f172a"></text>
  <rect x="510" y="124" width="180" height="44" rx="8" fill="#fff" stroke="#bfdbfe"/><text x="600" y="143" text-anchor="middle" font-size="12" fill="#0f172a">Recharts charts,</text><text x="600" y="159" text-anchor="middle" font-size="12" fill="#0f172a">Tailwind UI</text>
  <text x="170" y="143" text-anchor="middle" font-size="12" fill="#0f172a">sales, waste, logs, settings</text>
  <text x="170" y="159" text-anchor="middle" font-size="12" fill="#0f172a">+ admin view</text>
  <rect x="70" y="180" width="620" height="44" rx="8" fill="#fff" stroke="#bfdbfe"/>
  <text x="380" y="200" text-anchor="middle" font-size="12" fill="#0f172a">API routes: /api/pos/sales (authenticated POS push) · /api/analyze (server-side LLM, AI review)</text>
  <text x="380" y="216" text-anchor="middle" font-size="11" fill="#64748b">secrets (service_role, LLM key) stay server-side only</text>

  <line x1="380" y1="236" x2="380" y2="276" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="380,284 374,272 386,272" fill="#94a3b8"/>
  <text x="396" y="262" font-size="11.5" fill="#475569">@supabase/supabase-js (HTTPS / PostgREST + Auth)</text>

  <!-- Supabase tier -->
  <rect x="50" y="288" width="660" height="120" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="70" y="314" font-size="15" font-weight="700" fill="#15803d">2 · Supabase (managed backend)</text>
  <rect x="70" y="326" width="200" height="64" rx="8" fill="#fff" stroke="#bbf7d0"/><text x="170" y="352" text-anchor="middle" font-size="12.5" fill="#0f172a">PostgreSQL</text><text x="170" y="370" text-anchor="middle" font-size="11" fill="#64748b">9 normalised tables</text>
  <rect x="290" y="326" width="200" height="64" rx="8" fill="#fff" stroke="#bbf7d0"/><text x="390" y="352" text-anchor="middle" font-size="12.5" fill="#0f172a">Authentication</text><text x="390" y="370" text-anchor="middle" font-size="11" fill="#64748b">email + password, roles</text>
  <rect x="510" y="326" width="180" height="64" rx="8" fill="#fff" stroke="#bbf7d0"/><text x="600" y="352" text-anchor="middle" font-size="12.5" fill="#0f172a">Row-Level Security</text><text x="600" y="370" text-anchor="middle" font-size="11" fill="#64748b">multi-tenant isolation</text>

  <line x1="380" y1="408" x2="380" y2="446" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="380,454 374,442 386,442" fill="#94a3b8"/>

  <!-- Hosting tier -->
  <rect x="50" y="458" width="660" height="62" rx="12" fill="#fef9ec" stroke="#f59e0b" stroke-width="2"/>
  <text x="70" y="484" font-size="15" font-weight="700" fill="#b45309">3 · Cloud hosting (Vercel / Railway / Netlify)</text>
  <text x="70" y="506" font-size="12" fill="#475569">Builds the Next.js app from GitHub and serves it on a public HTTPS domain; env vars hold the keys.</text>
</svg>
