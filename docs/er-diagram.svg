<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" font-family="Segoe UI, Arial, sans-serif">
  <rect width="800" height="480" fill="#ffffff"/>
  <text x="400" y="32" text-anchor="middle" font-size="21" font-weight="700" fill="#15202e">MenuMetrics — Entity Relationship Diagram</text>
  <text x="400" y="52" text-anchor="middle" font-size="12.5" fill="#64748b">Relationships are one-to-many (1 ──&lt; ∞). PK = primary key, FK = foreign key.</text>

  <!-- relationship lines (drawn first, behind boxes) -->
  <line x1="240" y1="150" x2="300" y2="288" stroke="#94a3b8" stroke-width="1.8"/>
  <line x1="560" y1="150" x2="500" y2="288" stroke="#94a3b8" stroke-width="1.8"/>
  <line x1="660" y1="186" x2="660" y2="330" stroke="#94a3b8" stroke-width="1.8"/>
  <line x1="140" y1="186" x2="140" y2="330" stroke="#94a3b8" stroke-width="1.8"/>
  <text x="250" y="214" font-size="12" fill="#475569">1 ─&lt; ∞</text>
  <text x="512" y="214" font-size="12" fill="#475569">∞ &gt;─ 1</text>
  <text x="666" y="262" font-size="12" fill="#475569">1 ─&lt; ∞</text>
  <text x="146" y="262" font-size="12" fill="#475569">1 ─&lt; ∞</text>

  <!-- ingredients -->
  <g>
    <rect x="40" y="80" width="200" height="106" rx="8" fill="#ffffff" stroke="#4f9cf9" stroke-width="1.6"/>
    <rect x="40" y="80" width="200" height="26" rx="8" fill="#4f9cf9"/>
    <rect x="40" y="96" width="200" height="10" fill="#4f9cf9"/>
    <text x="140" y="98" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">ingredients</text>
    <text x="52" y="124" font-size="11.5" fill="#0f172a">🔑 id  (PK)</text>
    <text x="52" y="143" font-size="11.5" fill="#334155">name</text>
    <text x="52" y="162" font-size="11.5" fill="#334155">unit</text>
    <text x="52" y="181" font-size="11.5" fill="#334155">cost_per_unit</text>
  </g>

  <!-- dishes -->
  <g>
    <rect x="560" y="80" width="200" height="106" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="1.6"/>
    <rect x="560" y="80" width="200" height="26" rx="8" fill="#22c55e"/>
    <rect x="560" y="96" width="200" height="10" fill="#22c55e"/>
    <text x="660" y="98" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">dishes</text>
    <text x="572" y="124" font-size="11.5" fill="#0f172a">🔑 id  (PK)</text>
    <text x="572" y="143" font-size="11.5" fill="#334155">name</text>
    <text x="572" y="162" font-size="11.5" fill="#334155">category</text>
    <text x="572" y="181" font-size="11.5" fill="#334155">menu_price</text>
  </g>

  <!-- recipe_items (junction) -->
  <g>
    <rect x="300" y="250" width="200" height="106" rx="8" fill="#ffffff" stroke="#7c5cff" stroke-width="1.6"/>
    <rect x="300" y="250" width="200" height="26" rx="8" fill="#7c5cff"/>
    <rect x="300" y="266" width="200" height="10" fill="#7c5cff"/>
    <text x="400" y="268" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">recipe_items</text>
    <text x="312" y="294" font-size="11.5" fill="#0f172a">🔑 id  (PK)</text>
    <text x="312" y="313" font-size="11.5" fill="#b45309">dish_id  (FK → dishes)</text>
    <text x="312" y="332" font-size="11.5" fill="#b45309">ingredient_id  (FK → ingr.)</text>
    <text x="312" y="351" font-size="11.5" fill="#334155">quantity</text>
  </g>

  <!-- sales -->
  <g>
    <rect x="560" y="330" width="200" height="106" rx="8" fill="#ffffff" stroke="#f59e0b" stroke-width="1.6"/>
    <rect x="560" y="330" width="200" height="26" rx="8" fill="#f59e0b"/>
    <rect x="560" y="346" width="200" height="10" fill="#f59e0b"/>
    <text x="660" y="348" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">sales</text>
    <text x="572" y="374" font-size="11.5" fill="#0f172a">🔑 id  (PK)</text>
    <text x="572" y="393" font-size="11.5" fill="#b45309">dish_id  (FK → dishes)</text>
    <text x="572" y="412" font-size="11.5" fill="#334155">quantity</text>
    <text x="572" y="431" font-size="11.5" fill="#334155">sold_on</text>
  </g>

  <!-- waste_logs -->
  <g>
    <rect x="40" y="330" width="200" height="106" rx="8" fill="#ffffff" stroke="#ef4444" stroke-width="1.6"/>
    <rect x="40" y="330" width="200" height="26" rx="8" fill="#ef4444"/>
    <rect x="40" y="346" width="200" height="10" fill="#ef4444"/>
    <text x="140" y="348" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">waste_logs</text>
    <text x="52" y="374" font-size="11.5" fill="#0f172a">🔑 id  (PK)</text>
    <text x="52" y="393" font-size="11.5" fill="#b45309">ingredient_id  (FK → ingr.)</text>
    <text x="52" y="412" font-size="11.5" fill="#334155">quantity</text>
    <text x="52" y="431" font-size="11.5" fill="#334155">reason · logged_on</text>
  </g>
</svg>
