<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" font-family="Segoe UI, Arial, sans-serif">
  <rect width="760" height="520" fill="#ffffff"/>
  <text x="380" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#15202e">MenuMetrics — 3-Tier Architecture</text>
  <text x="380" y="58" text-anchor="middle" font-size="13" fill="#64748b">Browser presentation layer · Node.js application layer · SQLite data layer</text>

  <!-- Presentation tier -->
  <rect x="60" y="90" width="640" height="110" rx="12" fill="#eff6ff" stroke="#4f9cf9" stroke-width="2"/>
  <text x="80" y="116" font-size="15" font-weight="700" fill="#1d4ed8">1 · Presentation Layer (Client / Browser)</text>
  <rect x="80" y="128" width="180" height="56" rx="8" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="170" y="152" text-anchor="middle" font-size="12.5" fill="#0f172a">index.html</text>
  <text x="170" y="170" text-anchor="middle" font-size="11" fill="#64748b">5 tabs / UI structure</text>
  <rect x="290" y="128" width="180" height="56" rx="8" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="380" y="152" text-anchor="middle" font-size="12.5" fill="#0f172a">app.js</text>
  <text x="380" y="170" text-anchor="middle" font-size="11" fill="#64748b">fetch() + render + charts</text>
  <rect x="500" y="128" width="180" height="56" rx="8" fill="#ffffff" stroke="#bfdbfe"/>
  <text x="590" y="152" text-anchor="middle" font-size="12.5" fill="#0f172a">Chart.js + styles.css</text>
  <text x="590" y="170" text-anchor="middle" font-size="11" fill="#64748b">visualisation</text>

  <!-- Arrow 1 -->
  <line x1="380" y1="200" x2="380" y2="238" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="380,246 374,234 386,234" fill="#94a3b8"/>
  <text x="396" y="226" font-size="11.5" fill="#475569">HTTP / JSON (REST)</text>

  <!-- Application tier -->
  <rect x="60" y="250" width="640" height="120" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="80" y="276" font-size="15" font-weight="700" fill="#15803d">2 · Application Layer (Node.js — built-in HTTP, zero dependencies)</text>
  <rect x="80" y="288" width="180" height="64" rx="8" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="170" y="312" text-anchor="middle" font-size="12.5" fill="#0f172a">server.js</text>
  <text x="170" y="330" text-anchor="middle" font-size="11" fill="#64748b">router · REST API</text>
  <text x="170" y="345" text-anchor="middle" font-size="11" fill="#64748b">static file server</text>
  <rect x="290" y="288" width="180" height="64" rx="8" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="380" y="312" text-anchor="middle" font-size="12.5" fill="#0f172a">logic.js</text>
  <text x="380" y="330" text-anchor="middle" font-size="11" fill="#64748b">costing · menu engineering</text>
  <text x="380" y="345" text-anchor="middle" font-size="11" fill="#64748b">waste analysis · advisor</text>
  <rect x="500" y="288" width="180" height="64" rx="8" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="590" y="312" text-anchor="middle" font-size="12.5" fill="#0f172a">db.js (Repository)</text>
  <text x="590" y="330" text-anchor="middle" font-size="11" fill="#64748b">queries · seed data</text>
  <text x="590" y="345" text-anchor="middle" font-size="11" fill="#64748b">schema</text>

  <!-- Arrow 2 -->
  <line x1="380" y1="370" x2="380" y2="408" stroke="#94a3b8" stroke-width="2"/>
  <polygon points="380,416 374,404 386,404" fill="#94a3b8"/>
  <text x="396" y="396" font-size="11.5" fill="#475569">node:sqlite (SQL)</text>

  <!-- Data tier -->
  <rect x="60" y="420" width="640" height="80" rx="12" fill="#fef9ec" stroke="#f59e0b" stroke-width="2"/>
  <text x="80" y="446" font-size="15" font-weight="700" fill="#b45309">3 · Data Layer (SQLite — data/menumetrics.db)</text>
  <text x="80" y="472" font-size="12" fill="#475569">ingredients · dishes · recipe_items · sales · waste_logs</text>
  <text x="80" y="490" font-size="11" fill="#94a3b8">Relational, normalised; foreign keys enforced</text>
</svg>
